<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoWorld Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; /* Цвет неба */
            font-family: 'Nunito', sans-serif; 
            user-select: none;
            touch-action: none;
        }

        canvas { display: block; }

        /* Красивое меню */
        #menu {
            background: radial-gradient(circle, rgba(135,206,235,0.9) 0%, rgba(30,144,255,0.9) 100%);
            backdrop-filter: blur(5px);
        }

        .btn-play {
            background: linear-gradient(to bottom, #4ade80, #16a34a);
            box-shadow: 0 6px 0 #15803d, 0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .btn-play:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #15803d, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Полоса опыта */
        .xp-bar-container {
            width: 300px;
            height: 24px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #333;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #facc15, #f59e0b);
            width: 0%;
            transition: width 0.3s ease;
        }
        .xp-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: 900;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС (HUD) -->
    <div id="hud" class="fixed top-0 left-0 w-full p-4 flex justify-between items-start z-10 hidden pointer-events-none">
        <div class="flex items-center gap-4">
            <div id="player-emoji" class="text-5xl drop-shadow-lg bg-white/20 p-2 rounded-2xl border-2 border-white/30">🪰</div>
            <div>
                <h2 id="player-name-display" class="text-white text-2xl font-black drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">Муха</h2>
                <div class="xp-bar-container mt-1">
                    <div id="xp-fill" class="xp-bar-fill"></div>
                    <div id="xp-text" class="xp-text">0 / 30 XP</div>
                </div>
                <p id="eats-info" class="text-green-300 text-sm font-bold mt-1 drop-shadow-[0_1px_1px_rgba(0,0,0,0.8)]">Ест: 💩</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-white text-xl font-bold drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">Счет: <span id="score">0</span></p>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menu" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 border-blue-200">
            <h1 class="text-5xl font-black text-blue-500 mb-2 italic">EVO<span class="text-green-500">WORLD</span></h1>
            <p class="text-gray-500 font-bold mb-6 text-sm uppercase tracking-wider">Выживай и эволюционируй</p>
            
            <input type="text" id="name-input" placeholder="Твое имя..." class="w-full bg-gray-100 border-2 border-gray-300 p-4 rounded-xl mb-6 font-bold text-lg text-center focus:outline-none focus:border-blue-500">
            
            <button id="btn-play" class="btn-play w-full text-white font-black text-2xl py-4 rounded-xl uppercase tracking-widest">Играть</button>
            
            <div class="mt-8 text-left bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h3 class="font-bold text-gray-700 mb-2">Как играть:</h3>
                <ul class="text-sm text-gray-600 space-y-1 font-bold">
                    <li>🖱️ Курсор указывает направление</li>
                    <li>👆 Зажми левую кнопку мыши (или тап), чтобы лететь</li>
                    <li>🟢 Ешь то, что подсвечено зеленым</li>
                    <li>🔴 Убегай от тех, кто подсвечен красным!</li>
                </ul>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- 1. НАСТРОЙКИ ИГРЫ И ЭВОЛЮЦИИ ---
        const WORLD_WIDTH = 3000;
        const WORLD_HEIGHT = 1500;
        const GROUND_Y = WORLD_HEIGHT - 200;

        // Пищевая цепь. Кто кого ест и сколько нужно опыта.
        const EVOLUTION = [
            { id: 0, name: "Муха", emoji: "🪰", size: 25, speed: 6, reqXp: 30, eats: ['poop'] },
            { id: 1, name: "Бабочка", emoji: "🦋", size: 30, speed: 7, reqXp: 80, eats: ['flower'] },
            { id: 2, name: "Птичка", emoji: "🐦", size: 40, speed: 8, reqXp: 180, eats: ['fly', 'bug'] },
            { id: 3, name: "Сокол", emoji: "🦅", size: 55, speed: 10, reqXp: 400, eats: ['bird', 'butterfly', 'mouse'] },
            { id: 4, name: "Дракон", emoji: "🐉", size: 80, speed: 12, reqXp: 9999, eats: ['eagle', 'bird', 'pig'] }
        ];

        // Типы еды (статичная)
        const FOOD_TYPES = {
            'poop': { emoji: '💩', size: 15, xp: 5 },
            'flower': { emoji: '🌺', size: 20, xp: 10 },
            'bug': { emoji: '🪲', size: 15, xp: 15 },
            'mouse': { emoji: '🐁', size: 25, xp: 25 },
            'pig': { emoji: '🐖', size: 40, xp: 50 }
        };

        // --- 2. ПЕРЕМЕННЫЕ СОСТОЯНИЯ ---
        let gameActive = false;
        let mouseX = 0; let mouseY = 0;
        let isFlying = false; // Нажата ли кнопка мыши
        let camera = { x: 0, y: 0 };
        
        let player = {
            x: WORLD_WIDTH / 2,
            y: GROUND_Y - 100,
            vx: 0, vy: 0,
            stage: EVOLUTION[0],
            xp: 0,
            score: 0,
            direction: 1 // 1 вправо, -1 влево
        };

        let foods = []; // Статичная еда
        let bots = [];  // Другие мобы (ИИ)

        // --- 3. ГЕНЕРАЦИЯ МИРА ---
        function spawnFood() {
            if (foods.length > 100) return; // Лимит еды
            const types = Object.keys(FOOD_TYPES);
            const type = types[Math.floor(Math.random() * types.length)];
            // Еда спавнится ближе к земле
            foods.push({
                x: Math.random() * WORLD_WIDTH,
                y: GROUND_Y - 10 - Math.random() * 300,
                type: type,
                ...FOOD_TYPES[type]
            });
        }

        function spawnBot() {
            if (bots.length > 30) return; // Лимит ботов
            // Выбираем случайную стадию от Мухи до Птички (чтобы не было сразу драконов)
            const stage = EVOLUTION[Math.floor(Math.random() * 3)];
            bots.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * (GROUND_Y - 100),
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                stage: stage,
                type: stage.name.toLowerCase() === 'муха' ? 'fly' : (stage.name.toLowerCase() === 'бабочка' ? 'butterfly' : 'bird')
            });
        }

        function initWorld() {
            foods = []; bots = [];
            for(let i=0; i<80; i++) spawnFood();
            for(let i=0; i<20; i++) spawnBot();
        }

        // --- 4. УПРАВЛЕНИЕ ---
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        window.dispatchEvent(new Event('resize'));

        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('touchmove', (e) => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
        
        const startFlying = () => isFlying = true;
        const stopFlying = () => isFlying = false;
        
        canvas.addEventListener('mousedown', startFlying);
        canvas.addEventListener('mouseup', stopFlying);
        canvas.addEventListener('touchstart', startFlying);
        canvas.addEventListener('touchend', stopFlying);

        // --- 5. ЛОГИКА ИГРЫ (ОБНОВЛЕНИЕ) ---
        function updateUI() {
            document.getElementById('player-emoji').textContent = player.stage.emoji;
            document.getElementById('player-name-display').textContent = player.stage.name;
            document.getElementById('score').textContent = player.score;
            
            const req = player.stage.reqXp;
            const progress = req === 9999 ? 100 : (player.xp / req) * 100;
            document.getElementById('xp-fill').style.width = `${progress}%`;
            document.getElementById('xp-text').textContent = req === 9999 ? "MAX LEVEL" : `${player.xp} / ${req} XP`;

            // Показываем, что ест текущий уровень
            const eatEmojis = player.stage.eats.map(food => {
                if(FOOD_TYPES[food]) return FOOD_TYPES[food].emoji;
                const botStage = EVOLUTION.find(s => s.name.toLowerCase() === food || (food === 'fly' && s.id===0) || (food === 'butterfly' && s.id===1) || (food === 'bird' && s.id===2));
                return botStage ? botStage.emoji : food;
            });
            document.getElementById('eats-info').textContent = "Ест: " + eatEmojis.join(' ');
        }

        function checkEvolution() {
            if (player.xp >= player.stage.reqXp) {
                const nextStage = EVOLUTION[player.stage.id + 1];
                if (nextStage) {
                    player.xp -= player.stage.reqXp;
                    player.stage = nextStage;
                    // Небольшой эффект при эволюции
                    document.getElementById('player-emoji').classList.add('scale-150');
                    setTimeout(() => document.getElementById('player-emoji').classList.remove('scale-150'), 300);
                }
            }
            updateUI();
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('btn-play').textContent = "Возродиться";
        }

        function update() {
            if (!gameActive) return;

            // Движение игрока
            let targetWorldX = mouseX + camera.x;
            let targetWorldY = mouseY + camera.y;
            
            let dx = targetWorldX - player.x;
            let dy = targetWorldY - player.y;
            let dist = Math.hypot(dx, dy);

            if (dx !== 0) player.direction = dx > 0 ? 1 : -1;

            if (isFlying && dist > 10) {
                // Полет к мышке
                player.vx += (dx / dist) * player.stage.speed * 0.1;
                player.vy += (dy / dist) * player.stage.speed * 0.1;
            }

            player.vy += 0.2; // Гравитация (слабая)
            
            player.x += player.vx;
            player.y += player.vy;
            
            // Трение/Сопротивление воздуха
            player.vx *= 0.92;
            player.vy *= 0.92;

            // Ограничения карты
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x > WORLD_WIDTH) { player.x = WORLD_WIDTH; player.vx = 0; }
            if (player.y < 0) { player.y = 0; player.vy = 0; }
            if (player.y > GROUND_Y) { player.y = GROUND_Y; player.vy = 0; } // Пол

            // Обновление камеры (плавное следование)
            camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
            
            // Ограничение камеры
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT - canvas.height));

            // Поедание статичной еды
            for (let i = foods.length - 1; i >= 0; i--) {
                const food = foods[i];
                const distToFood = Math.hypot(player.x - food.x, player.y - food.y);
                if (distToFood < player.stage.size + food.size) {
                    if (player.stage.eats.includes(food.type)) {
                        player.xp += food.xp;
                        player.score += food.xp;
                        foods.splice(i, 1);
                        checkEvolution();
                    }
                }
            }

            // Логика Ботов
            for (let i = bots.length - 1; i >= 0; i--) {
                let bot = bots[i];
                bot.x += bot.vx;
                bot.y += bot.vy;

                // Отскок от стен
                if (bot.x < 0 || bot.x > WORLD_WIDTH) bot.vx *= -1;
                if (bot.y < 0 || bot.y > GROUND_Y) bot.vy *= -1;

                // Взаимодействие игрока с ботами
                const distToBot = Math.hypot(player.x - bot.x, player.y - bot.y);
                if (distToBot < player.stage.size + bot.stage.size) {
                    // Можем ли МЫ съесть бота?
                    if (player.stage.eats.includes(bot.type)) {
                        player.xp += bot.stage.reqXp; // Даем много опыта за убийство
                        player.score += bot.stage.reqXp;
                        bots.splice(i, 1);
                        checkEvolution();
                    } 
                    // Может ли БОТ съесть нас?
                    else if (bot.stage.eats.includes(player.stage.name.toLowerCase() === 'муха' ? 'fly' : 'bird')) {
                        gameOver(); // Нас съели!
                    }
                }
            }

            // Спавн новых объектов, если мало
            if (Math.random() < 0.05) spawnFood();
            if (Math.random() < 0.01) spawnBot();
        }

        // --- 6. ОТРИСОВКА ---
        function draw() {
            // Очистка и фон неба
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Отрисовка Земли (Травы и почвы)
            ctx.fillStyle = '#4ade80'; // Трава
            ctx.fillRect(0, GROUND_Y, WORLD_WIDTH, WORLD_HEIGHT - GROUND_Y);
            ctx.fillStyle = '#854d0e'; // Земля под травой
            ctx.fillRect(0, GROUND_Y + 20, WORLD_WIDTH, WORLD_HEIGHT - GROUND_Y - 20);

            // Отрисовка Еды
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            foods.forEach(food => {
                ctx.font = `${food.size * 2}px Arial`;
                ctx.fillText(food.emoji, food.x, food.y);
                
                // Подсветка зеленым, если можем съесть
                if (player.stage.eats.includes(food.type)) {
                    ctx.strokeStyle = '#22c55e';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(food.x, food.y, food.size * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            // Отрисовка Ботов
            bots.forEach(bot => {
                ctx.save();
                ctx.translate(bot.x, bot.y);
                if (bot.vx < 0) ctx.scale(-1, 1); // Поворот в сторону движения
                ctx.font = `${bot.stage.size * 2}px Arial`;
                ctx.fillText(bot.stage.emoji, 0, 0);
                ctx.restore();

                // Подсветка (Зеленым - еда, Красным - хищник)
                let isFood = player.stage.eats.includes(bot.type);
                let isPredator = bot.stage.eats.includes(player.stage.name.toLowerCase() === 'муха' ? 'fly' : 'bird'); // Упрощенная проверка
                
                if (isFood || isPredator) {
                    ctx.strokeStyle = isFood ? '#22c55e' : '#ef4444';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(bot.x, bot.y, bot.stage.size * 1.2, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            // Отрисовка Игрока
            ctx.save();
            ctx.translate(player.x, player.y);
            // Поворот по направлению мыши
            if (player.direction === -1) ctx.scale(-1, 1); 
            // Небольшой наклон при падении/полете
            ctx.rotate(player.vy * 0.02 * player.direction); 
            
            ctx.font = `${player.stage.size * 2}px Arial`;
            ctx.fillText(player.stage.emoji, 0, 0);
            
            // Имя над игроком
            ctx.scale(player.direction, 1); // Возвращаем скейл для текста
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Nunito';
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'black';
            ctx.strokeText(player.stage.name, 0, -player.stage.size - 10);
            ctx.fillText(player.stage.name, 0, -player.stage.size - 10);
            ctx.restore();

            ctx.restore();

            if (gameActive) requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            update();
            draw();
        }

        // --- 7. ЗАПУСК ---
        document.getElementById('btn-play').onclick = () => {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            player.stage = EVOLUTION[0];
            player.xp = 0;
            player.score = 0;
            player.x = WORLD_WIDTH / 2;
            player.y = GROUND_Y - 100;
            player.vx = 0; player.vy = 0;
            
            initWorld();
            updateUI();
            
            gameActive = true;
            gameLoop();
        };

        // Рисуем фон для меню с самого начала
        draw(); 
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoWorld - Dynamic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Nunito', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }

        #menu { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); }

        .btn-play {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
            box-shadow: 0 6px 0 #1e3a8a, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .btn-play:active { transform: translateY(6px); box-shadow: 0 0px 0 #1e3a8a; }

        .bar-container {
            width: 250px; height: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #555; border-radius: 10px;
            overflow: hidden; position: relative; margin-top: 4px;
        }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #facc15, #f59e0b); transition: width 0.2s; }
        .o2-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #0284c7); transition: width 0.1s; }
        
        .bar-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 12px; font-weight: 900; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <!-- ИНТЕРФЕЙС -->
    <div id="hud" class="fixed top-0 left-0 w-full p-4 flex justify-between items-start z-10 hidden pointer-events-none">
        <div class="flex items-start gap-4">
            <div id="player-emoji" class="text-6xl drop-shadow-lg bg-white/10 p-2 rounded-2xl border-2 border-white/20">🦟</div>
            <div>
                <h2 id="player-name-display" class="text-white text-2xl font-black drop-shadow-md">Комар</h2>
                
                <div class="bar-container">
                    <div id="xp-fill" class="xp-fill" style="width: 0%;"></div>
                    <div id="xp-text" class="bar-text">0 / 30 XP</div>
                </div>

                <div class="bar-container border-blue-400">
                    <div id="o2-fill" class="o2-fill" style="width: 100%;"></div>
                    <div id="o2-text" class="bar-text text-blue-100">OXYGEN</div>
                </div>

                <p id="eats-info" class="text-green-400 text-sm font-bold mt-2 drop-shadow-md">Ест: 💩</p>
            </div>
        </div>
        <div class="text-right bg-black/50 p-3 rounded-xl border border-white/10">
            <p class="text-gray-400 text-xs font-bold uppercase">Счет</p>
            <p class="text-white text-3xl font-black"><span id="score">0</span></p>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div id="menu" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-gray-700">
            <h1 class="text-5xl font-black text-blue-400 mb-2 italic tracking-tighter">EVO<span class="text-green-400">WORLD</span></h1>
            <p id="death-reason" class="text-red-400 font-bold mb-6 uppercase hidden">Вы погибли!</p>
            
            <button id="btn-play" class="btn-play w-full text-white font-black text-2xl py-4 rounded-xl uppercase tracking-widest mt-4">Играть</button>
            
            <div class="mt-8 text-left bg-gray-800 p-4 rounded-xl border border-gray-600 text-gray-300">
                <h3 class="font-bold text-white mb-2">Механика:</h3>
                <ul class="text-sm space-y-2 font-bold">
                    <li>🖱️ Курсор управляет полетом (Влево/Вправо)</li>
                    <li>👆 <b>КЛИКАЙ</b> чтобы прыгать (махать крыльями)</li>
                    <li>🐖 Свиньи и мыши ходят и оставляют 💩</li>
                    <li>🌌 Выше облаков нужен кислород!</li>
                </ul>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const WORLD_WIDTH = 4000;
        const WORLD_HEIGHT = 4000;
        const GROUND_Y = 3800; 
        const SPACE_Y = 1500;

        // ЭВОЛЮЦИЯ
        const EVOLUTION = [
            { id: 0, name: "Комар", emoji: "🦟", size: 20, speed: 6, flap: -8, reqXp: 30, eats: ['poop'] },
            { id: 1, name: "Бабочка", emoji: "🦋", size: 30, speed: 7, flap: -9, reqXp: 80, eats: ['flower'] },
            { id: 2, name: "Птичка", emoji: "🐦", size: 40, speed: 9, flap: -10, reqXp: 200, eats: ['bug'] },
            { id: 3, name: "Сокол", emoji: "🦅", size: 60, speed: 12, flap: -12, reqXp: 500, eats: ['mouse'] },
            { id: 4, name: "Дракон", emoji: "🐉", size: 90, speed: 15, flap: -14, reqXp: 1200, eats: ['pig', 'cloud'] },
            { id: 5, name: "Пришелец", emoji: "👽", size: 100, speed: 18, flap: -16, reqXp: 3000, eats: ['star'] },
            { id: 6, name: "НЛО", emoji: "🛸", size: 130, speed: 22, flap: -18, reqXp: 8000, eats: ['meteor'] },
            { id: 7, name: "Божество", emoji: "🌌", size: 180, speed: 25, flap: -20, reqXp: 99999, eats: ['planet'] }
        ];

        // 1. СТАТИЧНАЯ / ПЛАВАЮЩАЯ ЕДА
        const FOOD_TYPES = {
            'poop':   { emoji: '💩', size: 15, xp: 5 },
            'flower': { emoji: '🌺', size: 20, xp: 10 },
            'cloud':  { emoji: '☁️', size: 60, xp: 100, floatSpeed: 1 }, 
            'star':   { emoji: '⭐', size: 30, xp: 200, floatSpeed: 0.5 }, 
            'meteor': { emoji: '☄️', size: 50, xp: 500, floatSpeed: 3 },
            'planet': { emoji: '🪐', size: 100,xp: 1500, floatSpeed: 0.2 }
        };

        // 2. ЖИВЫЕ СУЩЕСТВА (ИИ)
        const ANIMAL_TYPES = {
            'bug':   { emoji: '🪲', size: 15, xp: 15, speed: 3, jump: -6, isFlying: true, minY: GROUND_Y-500 },
            'mouse': { emoji: '🐁', size: 25, xp: 25, speed: 4, jump: -5, isFlying: false, minY: GROUND_Y },
            'pig':   { emoji: '🐖', size: 40, xp: 50, speed: 2, jump: -4, isFlying: false, minY: GROUND_Y }
        };

        let gameActive = false;
        let mouseX = 0; let mouseY = 0;
        let camera = { x: 0, y: 0 };
        
        let player = {
            x: WORLD_WIDTH / 2, y: GROUND_Y - 100,
            vx: 0, vy: 0, stage: EVOLUTION[0],
            xp: 0, score: 0, direction: 1, oxygen: 100
        };

        let foods = []; 
        let animals = []; // Новый массив для живых существ

        // --- ГЕНЕРАЦИЯ ---
        function spawnFood(type, forcedX = null, forcedY = null) {
            if (foods.length > 200) return;
            let data = FOOD_TYPES[type];
            
            let yPos = forcedY;
            if (!yPos) {
                if (type === 'poop' || type === 'flower') yPos = GROUND_Y - Math.random() * 50;
                else if (type === 'cloud') yPos = SPACE_Y + Math.random() * (GROUND_Y - 800 - SPACE_Y);
                else yPos = Math.random() * SPACE_Y; // Космос
            }

            foods.push({
                x: forcedX || Math.random() * WORLD_WIDTH,
                y: yPos,
                type: type, ...data
            });
        }

        function spawnAnimal() {
            if (animals.length > 50) return;
            const types = Object.keys(ANIMAL_TYPES);
            const type = types[Math.floor(Math.random() * types.length)];
            const data = ANIMAL_TYPES[type];
            
            animals.push({
                x: Math.random() * WORLD_WIDTH,
                y: GROUND_Y - 100,
                vx: (Math.random() - 0.5) * data.speed,
                vy: 0,
                type: type, ...data,
                direction: Math.random() > 0.5 ? 1 : -1
            });
        }

        function initWorld() {
            foods = []; animals = [];
            for(let i=0; i<60; i++) spawnFood('flower');
            for(let i=0; i<30; i++) spawnFood('cloud');
            for(let i=0; i<40; i++) { spawnFood('star'); spawnFood('meteor'); spawnFood('planet'); }
            for(let i=0; i<40; i++) spawnAnimal();
        }

        // --- УПРАВЛЕНИЕ ---
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));
        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('touchmove', (e) => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
        
        function flap() {
            if (!gameActive) return;
            player.vy = player.stage.flap; // ТОЛЬКО толчок вверх при клике (без сброса горизонтальной скорости)
        }
        canvas.addEventListener('mousedown', flap);
        canvas.addEventListener('touchstart', flap);

        // --- ЛОГИКА ---
        function updateUI() {
            document.getElementById('player-emoji').textContent = player.stage.emoji;
            document.getElementById('player-name-display').textContent = player.stage.name;
            document.getElementById('score').textContent = player.score;
            
            const req = player.stage.reqXp;
            document.getElementById('xp-fill').style.width = req === 99999 ? '100%' : `${(player.xp / req) * 100}%`;
            document.getElementById('xp-text').textContent = req === 99999 ? "MAX" : `${player.xp} / ${req} XP`;

            const eatEmojis = player.stage.eats.map(f => FOOD_TYPES[f] ? FOOD_TYPES[f].emoji : (ANIMAL_TYPES[f] ? ANIMAL_TYPES[f].emoji : '🥩'));
            document.getElementById('eats-info').textContent = "Ест: " + eatEmojis.join(' ');
        }

        function checkEvolution() {
            if (player.xp >= player.stage.reqXp) {
                const nextStage = EVOLUTION[player.stage.id + 1];
                if (nextStage) {
                    player.xp -= player.stage.reqXp; player.stage = nextStage;
                    document.getElementById('player-emoji').classList.add('scale-150');
                    setTimeout(() => document.getElementById('player-emoji').classList.remove('scale-150'), 300);
                }
            }
            updateUI();
        }

        function die(reason) {
            gameActive = false;
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('death-reason').textContent = reason;
            document.getElementById('death-reason').classList.remove('hidden');
        }

        function update() {
            if (!gameActive) return;

            // 1. ИДЕАЛЬНОЕ ДВИЖЕНИЕ ИГРОКА
            let targetWorldX = mouseX + camera.x;
            let dx = targetWorldX - player.x;
            
            // Плавно тянемся к курсору по горизонтали (LERP)
            if (Math.abs(dx) > 10) {
                player.direction = dx > 0 ? 1 : -1;
                let targetVx = player.direction * player.stage.speed;
                player.vx += (targetVx - player.vx) * 0.1; // Плавное ускорение
            } else {
                player.vx *= 0.9; // Торможение, если курсор рядом
            }

            player.vy += 0.4; // Гравитация
            player.vy *= 0.96; // Сопротивление воздуха
            
            player.x += player.vx;
            player.y += player.vy;

            // Ограничения карты
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            if (player.x > WORLD_WIDTH) { player.x = WORLD_WIDTH; player.vx = 0; }
            if (player.y < 0) { player.y = 0; player.vy = 0; } 
            if (player.y > GROUND_Y) { player.y = GROUND_Y; player.vy = 0; }

            // 2. КИСЛОРОД
            if (player.y < SPACE_Y) {
                if (player.stage.id < 5) {
                    player.oxygen -= 0.3; 
                    if (player.oxygen <= 0) die("Задохнулся в космосе! 🥶");
                } else { player.oxygen = 100; }
            } else {
                player.oxygen = Math.min(100, player.oxygen + 1); 
            }
            document.getElementById('o2-fill').style.width = `${player.oxygen}%`;
            document.getElementById('o2-fill').style.background = player.oxygen < 30 ? 'red' : '';

            // КАМЕРА
            camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT - canvas.height));

            // 3. ИСКУССТВЕННЫЙ ИНТЕЛЛЕКТ ЖИВОТНЫХ
            for (let i = animals.length - 1; i >= 0; i--) {
                let anim = animals[i];
                anim.vy += 0.4; // Гравитация животных
                anim.x += anim.vx;
                anim.y += anim.vy;

                // Столкновение с землей
                if (anim.y > anim.minY) {
                    anim.y = anim.minY;
                    anim.vy = 0;
                    if (Math.random() < 0.02) anim.vy = anim.jump; // Случайный прыжок
                }

                // Смена направления и границы
                if (Math.random() < 0.01) {
                    anim.direction = Math.random() > 0.5 ? 1 : -1;
                    anim.vx = anim.direction * anim.speed;
                }
                if (anim.x < 0 || anim.x > WORLD_WIDTH) anim.vx *= -1;

                // ПРОЦЕСС ВЫДЕЛЕНИЯ 💩 (Только Свиньи и Мыши)
                if ((anim.type === 'pig' || anim.type === 'mouse') && Math.random() < 0.005) {
                    spawnFood('poop', anim.x, anim.y);
                }

                // Поедание животного игроком
                const dist = Math.hypot(player.x - anim.x, player.y - anim.y);
                if (dist < player.stage.size + anim.size) {
                    if (player.stage.eats.includes(anim.type)) {
                        player.xp += anim.xp; player.score += anim.xp;
                        animals.splice(i, 1); checkEvolution();
                    }
                }
            }

            // 4. ДВИЖЕНИЕ ОБЛАКОВ И КОСМОСА
            for (let i = foods.length - 1; i >= 0; i--) {
                const food = foods[i];
                if (food.floatSpeed) food.x -= food.floatSpeed; // Летят влево
                if (food.x < -100) food.x = WORLD_WIDTH + 100; // Возвращаются справа

                const dist = Math.hypot(player.x - food.x, player.y - food.y);
                if (dist < player.stage.size + food.size && player.stage.eats.includes(food.type)) {
                    player.xp += food.xp; player.score += food.xp;
                    foods.splice(i, 1); checkEvolution();
                }
            }

            // Восполнение мобов
            if (animals.length < 40 && Math.random() < 0.02) spawnAnimal();
            if (foods.filter(f=>f.type==='poop').length < 30 && Math.random() < 0.01) spawnFood('poop');
        }

        // --- ОТРИСОВКА ---
        function draw() {
            let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (camera.y < SPACE_Y) { bgGrad.addColorStop(0, '#000000'); bgGrad.addColorStop(1, '#0f172a'); } 
            else { bgGrad.addColorStop(0, '#1e3a8a'); bgGrad.addColorStop(1, '#87CEEB'); }
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (camera.y < SPACE_Y + 500) {
                ctx.fillStyle = 'white';
                for(let i=0; i<50; i++) { ctx.fillRect((i * 87) % canvas.width, (i * 43) % canvas.height, 2, 2); }
            }

            ctx.save(); ctx.translate(-camera.x, -camera.y);

            // ЗЕМЛЯ
            ctx.fillStyle = '#166534'; ctx.fillRect(0, GROUND_Y, WORLD_WIDTH, WORLD_HEIGHT - GROUND_Y);

            // ЕДА / ОБЪЕКТЫ
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            foods.forEach(food => {
                ctx.font = `${food.size * 2}px Arial`; ctx.fillText(food.emoji, food.x, food.y);
                if (player.stage.eats.includes(food.type)) {
                    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(food.x, food.y, food.size * 1.5, 0, Math.PI * 2); ctx.stroke();
                }
            });

            // ЖИВОТНЫЕ (ИИ)
            animals.forEach(anim => {
                ctx.save(); ctx.translate(anim.x, anim.y);
                ctx.scale(anim.direction, 1); // Поворот куда идет
                ctx.font = `${anim.size * 2}px Arial`; ctx.fillText(anim.emoji, 0, 0);
                ctx.restore();

                if (player.stage.eats.includes(anim.type)) {
                    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(anim.x, anim.y, anim.size * 1.3, 0, Math.PI * 2); ctx.stroke();
                }
            });

            // ИГРОК
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.scale(player.direction, 1); 
            ctx.rotate(player.vy * 0.03); 
            ctx.font = `${player.stage.size * 2}px Arial`;
            ctx.fillText(player.stage.emoji, 0, 0);
            ctx.restore(); 

            ctx.fillStyle = 'white'; ctx.font = 'bold 16px Nunito'; ctx.lineWidth = 3; ctx.strokeStyle = 'black';
            ctx.strokeText(player.stage.name, player.x, player.y - player.stage.size - 10);
            ctx.fillText(player.stage.name, player.x, player.y - player.stage.size - 10);

            ctx.restore();
            if (gameActive) requestAnimationFrame(gameLoop);
        }

        function gameLoop() { update(); draw(); }

        document.getElementById('btn-play').onclick = () => {
            document.getElementById('menu').classList.add('hidden'); document.getElementById('hud').classList.remove('hidden');
            player.stage = EVOLUTION[0]; player.xp = 0; player.score = 0; player.oxygen = 100;
            player.x = WORLD_WIDTH / 2; player.y = GROUND_Y - 50; player.vx = 0; player.vy = 0;
            initWorld(); updateUI(); gameActive = true; gameLoop();
        };

        draw(); 
    </script>
</body>
</html>
